name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validator:
    name: Run EVP/1 reference validator (20+ tests)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest

      - name: Run pytest
        run: pytest EVP-1-validator-tests.py -v

      - name: Validate JSON Schema is parseable
        run: |
          python -c "import json; json.load(open('spec/evp-1.schema.json')); print('Schema OK')"

      - name: Validate every test vector JSON parses
        run: |
          python <<'PY'
          import json, glob, sys
          errors = []
          for f in glob.glob('test_vectors/**/*.json', recursive=True):
              try:
                  json.load(open(f))
              except Exception as e:
                  errors.append((f, str(e)))
          if errors:
              for f, e in errors:
                  print(f"FAIL {f}: {e}", file=sys.stderr)
              sys.exit(1)
          print(f"All {len(glob.glob('test_vectors/**/*.json', recursive=True))} JSON vectors parsed cleanly")
          PY

  schema-against-valid-vectors:
    name: Validate sample verdicts against schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install jsonschema
      - name: Run schema validation
        run: |
          python <<'PY'
          import json, glob, sys, jsonschema
          schema = json.load(open('spec/evp-1.schema.json'))
          validator = jsonschema.Draft202012Validator(schema)
          fail = 0
          for f in sorted(glob.glob('test_vectors/valid/*.json')):
              v = json.load(open(f))
              errors = list(validator.iter_errors(v))
              if errors:
                  fail += 1
                  print(f"FAIL {f}")
                  for e in errors[:3]:
                      print(f"  - {e.message} at {list(e.absolute_path)}")
              else:
                  print(f"OK   {f}")
          if fail:
              sys.exit(f"{fail} valid vectors failed schema validation")
          PY
